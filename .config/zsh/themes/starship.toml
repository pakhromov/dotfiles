($zig[в•ұ ](fg:color_fg bg:color_bg))\
($sudo[в•ұ ](fg:color_fg bg:color_bg))\
($shell[в•ұ ](fg:color_fg bg:color_bg))\
($scala[в•ұ ](fg:color_fg bg:color_bg))\
($rlang[в•ұ ](fg:color_fg bg:color_bg))\
($php[в•ұ ](fg:color_fg bg:color_bg))\
