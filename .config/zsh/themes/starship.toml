[git_branch]
format = '[$symbol$branch(:$remote_branch) ]($style)'
symbol = "ï„¦ "
style = 'bold fg:76 bg:color_bg'

[git_status]
format = '([ $all_status$ahead_behind]($style))'
style = 'bold fg:246 bg:color_bg'
conflicted = '~${count} '
stashed = '*${count} '
ahead = 'â‡،${count} '
behind = 'â‡£${count} '
