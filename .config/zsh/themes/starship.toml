add_newline = false
palette = 'dark'

[palettes.dark]
#color_bg = '#272727'
color_bg = '#242424'
color_fg = '#000000'

[cmd_duration]
min_time = 0
show_milliseconds = true
format = '[$duration]($style)'
style = 'fg:248 bg:color_bg'

[status]
disabled = false
format = '[$symbol( $common_meaning)( $signal_name)( $signal_number)( $maybe_int) ]($style)'
style = 'bold fg:160 bg:color_bg'
success_style = 'bold fg:70 bg:color_bg'
symbol = 'âœک'
success_symbol = 'ï€Œ'
map_symbol = false
pipestatus = true
