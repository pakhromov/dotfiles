($gcloud[в•ұ ](fg:color_fg bg:color_bg))\
($dotnet[в•ұ ](fg:color_fg bg:color_bg))\
($username$hostname[в•ұ ](fg:color_fg bg:color_bg))\
$status\
([в•ұ ](fg:color_fg bg:color_bg)$cmd_duration)\
[оӮҙ](fg:color_bg) $line_break\
$character\
