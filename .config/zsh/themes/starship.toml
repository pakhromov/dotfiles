[custom.per_dir_history]
command = 'echo "local"'
when = '[ "$_per_directory_history_is_global" != "true" ]'
style = 'fg:220 bg:color_bg'
format = '[$symbol$output ]($style)'
symbol = "ï‡ڑ "

[custom.claude]
command = 'echo ""'
when = '[ -d "$HOME/.claude/projects/$(echo "$PWD" | sed "s|/\\.|--|g; s|/|-|g")" ]'
style = 'fg:#d77757 bg:color_bg'
format = '[$symbol$output ]($style)'
symbol = "î¸چ  claude"

[custom.codex]
command = 'echo ""'
when = "sqlite3 \"$CODEX_HOME/state_5.sqlite\" \"SELECT 1 FROM threads WHERE cwd='$PWD' LIMIT 1\" 2>/dev/null | grep -q 1"
format = '[$symbol$output ]($style)'
style = 'fg:#74aa9c bg:color_bg'
symbol = "î¸چ  codex"

[custom.docker]
command = 'docker context show'
when = 'test -f docker-compose.yml || test -f docker-compose.yaml || test -f compose.yml || test -f compose.yaml || test -f Dockerfile'
format = '[$symbol$output ]($style)'
style = 'bold fg:blue bg:color_bg'
symbol = "ïŒˆ "
