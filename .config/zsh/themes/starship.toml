"$schema" = 'https://starship.rs/config-schema.json'
format = """
[в•ӯв”Җ](#585858)[оӮ¶](color_bg)\
$os[оӮұ ](fg:color_fg bg:color_bg)\
$directory\
([в•ұ ](fg:color_fg bg:color_bg)$git_branch)$git_status$git_metrics\
[оӮј](fg:color_bg)\
$fill\
[оӮә](fg:color_bg)\
[ ](bg:color_bg)\
($direnv[в•ұ ](fg:color_fg bg:color_bg))\
($package[в•ұ ](fg:color_fg bg:color_bg))\
