($nix_shell[в•ұ ](fg:color_fg bg:color_bg))\
($nim[в•ұ ](fg:color_fg bg:color_bg))\
($netns[в•ұ ](fg:color_fg bg:color_bg))\
($meson[в•ұ ](fg:color_fg bg:color_bg))\
($memory_usage[в•ұ ](fg:color_fg bg:color_bg))\
($localip[в•ұ ](fg:color_fg bg:color_bg))\
($kubernetes[в•ұ ](fg:color_fg bg:color_bg))\
($kotlin[в•ұ ](fg:color_fg bg:color_bg))\
