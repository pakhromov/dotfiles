add_newline = false
palette = 'dark'

[palettes.dark]
#color_bg = '#272727'
color_bg = '#242424'
color_fg = '#000000'

[cmd_duration]
min_time = 0
show_milliseconds = true
format = '[$duration]($style)'
style = 'fg:248 bg:color_bg'

[status]
disabled = false
format = '[$symbol( $common_meaning)( $signal_name)( $signal_number)( $maybe_int) ]($style)'
style = 'bold fg:160 bg:color_bg'
success_style = 'bold fg:70 bg:color_bg'
symbol = 'Ô£İ'
success_symbol = '´Çî'
map_symbol = false
pipestatus = true
pipestatus_format = '[$pipestatus]($style)'

[character]
success_symbol = '[Ôò░ÔöÇ](bold fg:#585858)[¯èà¯¬Â](bold fg:#E0F8FF)'
error_symbol = '[Ôò░ÔöÇ](bold fg:#585858)[¯èà¯¬Â](bold fg:196)'

[fill]
symbol = 'ÔöÇ'
style = 'fg:240'

[os]
format = '[$symbol]($style)'
style = 'fg:#E0F8FF bg:color_bg'
disabled = false

[sudo]
format = '[$symbol ]($style)'
style = 'bold fg:blue bg:color_bg'
symbol = "¾░¬ï sudo"
disabled = false

[directory]
format ='[$read_only]($read_only_style)[¯ù¥ ](fg:#43CCEA bg:color_bg)[$path ]($style)'
style = 'fg:#43CCEA bg:color_bg'
read_only_style = 'bold fg:31 bg:color_bg'
repo_root_format = '[$read_only]($read_only_style)[$before_root_path]($before_repo_root_style)[$repo_root]($repo_root_style)[$path ]($style)'
before_repo_root_style = 'bold fg:31 bg:color_bg'
repo_root_style = 'bold fg:39 bg:color_bg'
read_only = "¾░î¥ "
home_symbol = '~'
truncate_to_repo = false
truncation_length = 5

[jobs]
symbol = '´é« '
number_threshold = 2
symbol_threshold = 1
format = '[$symbol$number ]($style)'
style = 'bold fg:76 bg:color_bg'

[git_branch]
format = '[$symbol$branch(:$remote_branch) ]($style)'
symbol = "´äĞ "
style = 'bold fg:76 bg:color_bg'

[git_status]
format = '([ $all_status$ahead_behind]($style))'
style = 'bold fg:246 bg:color_bg'
conflicted = '~${count} '
stashed = '*${count} '
ahead = 'Ôçí${count} '
behind = 'Ôçú${count} '
diverged = 'Ôçá${behind_count} Ôçó${ahead_count} '
untracked = '?${count} '
modified = '!${count} '
staged = '+${count} '
renamed = '┬╗${count} '
deleted = 'Ô£İ${count} '

[git_metrics]
deleted_style = 'bold fg:bold red bg:color_bg'
added_style = 'bold fg:bold green bg:color_bg'
format = '([ +$added ]($added_style))([-$deleted ]($deleted_style))'
disabled = false

[container]
format = '[$symbol \[$name\] ]($style)'
style = 'bold dimmed fg:red bg:color_bg'
symbol = "´ÆÀ "

[docker_context]
format = '[$symbol$context ]($style)'
style = 'bold fg:blue bg:color_bg'
symbol = "´îê "

[kubernetes]
format = '[($user on )($cluster in )$context \($namespace\) ]($style)'
style = 'bold fg:blue bg:color_bg'
detect_files = ['k8s']
symbol = "¯áØ "
disabled = false

[username]
format = '[$user]($style)'
style_root = 'bold fg:178 bg:color_bg'
style_user = 'fg:180 bg:color_bg'

[hostname]
format = '[$ssh_symbol$hostname]($style)'
style = 'fg:180 bg:color_bg'
ssh_symbol = '@'

[direnv]
disabled = false
format = '[$symbol$loaded/$allowed ]($style)'
style = 'bold fg:178 bg:color_bg'
