add_newline = false
palette = 'dark'


[palettes.dark]
#color_bg = '#272727'
color_bg = '#242424'
color_fg = '#000000'

[cmd_duration]
min_time = 0
show_milliseconds = true
format = '[пү’ $duration ]($style)'
style = 'fg:248 bg:color_bg'

[status]
disabled = false
format = '[$symbol( $common_meaning)( $signal_name)( $signal_number)( $maybe_int) ]($style)'
style = 'bold fg:160 bg:color_bg'
success_style = 'bold fg:70 bg:color_bg'
symbol = 'вңҳ'
success_symbol = 'пҖҢ'
map_symbol = false
pipestatus = true
pipestatus_format = '[$pipestatus]($style)'

[character]
success_symbol = '[в•°в”Җ](bold fg:#585858)[оҠ…оӘ¶](bold fg:#E0F8FF)'
error_symbol = '[в•°в”ҖоҠ…оӘ¶](bold fg:196)'
vimcmd_symbol = '[в•°в”Җвқ®](bold fg:76)'
vimcmd_replace_one_symbol = '[в–¶](bold fg:76)'
vimcmd_replace_symbol = '[в–¶](bold fg:76)'
vimcmd_visual_symbol = '[V](bold fg:76)'

[fill]
symbol = 'в”Җ'
style = 'fg:240'

[os]
format = '[$symbol]($style)'
style = 'fg:#E0F8FF bg:color_bg'
disabled = false

[directory]
format ='[$read_only]($read_only_style)[о—ҫ ](fg:#43CCEA bg:color_bg)[$path ]($style)'
style = 'fg:#43CCEA bg:color_bg'
read_only_style = 'bold fg:31 bg:color_bg'
repo_root_format = '[$read_only]($read_only_style)[$before_root_path]($before_repo_root_style)[$repo_root]($repo_root_style)[$path ]($style)'
before_repo_root_style = 'bold fg:31 bg:color_bg'
repo_root_style = 'bold fg:39 bg:color_bg'
read_only = "у°Ңҫ "
home_symbol = '~'
truncate_to_repo = false
fish_style_pwd_dir_length = 2

[git_branch]
format = '[$symbol$branch(:$remote_branch) ]($style)'
symbol = "п„Ұ "
style = 'bold fg:76 bg:color_bg'

[git_status]
format = '([$all_status$ahead_behind]($style))'
style = 'bold fg:246 bg:color_bg'
conflicted = '~${count} '
stashed = '*${count} '
ahead = 'вҮЎ${count} '
behind = 'вҮЈ${count} '
diverged = 'вҮ ${behind_count} вҮў${ahead_count} '
untracked = '?${count} '
modified = '!${count} '
staged = '+${count} '
renamed = 'В»${count} '
deleted = 'вңҳ${count} '

[direnv]
format = '[$symbol$loaded/$allowed ]($style)'
style = 'bold fg:178 bg:color_bg'

[c]
format = '[$symbol($version(-$name) )]($style)'
style = 'bold fg:149 bg:color_bg'
symbol = "оҳһ "

[cpp]
format = '[$symbol($version(-$name) )]($style)'
style = 'bold fg:149 bg:color_bg'
symbol = "оҳқ "

[cmake]
format = '[$symbol($version )]($style)'
style = 'bold fg:blue bg:color_bg'
symbol = "оһ” "

[conda]
format = '[$symbol$environment ]($style)'
style = 'bold fg:green bg:color_bg'
symbol = "п„Ң "

[container]
format = '[$symbol \[$name\] ]($style)'
style = 'bold dimmed fg:red bg:color_bg'

[docker_context]
format = '[$symbol$context ]($style)'
style = 'bold fg:blue bg:color_bg'
symbol = "пҢҲ "

[username]
format = '[$user]($style)'
style_root = 'bold fg:178 bg:color_bg'
style_user = 'fg:180 bg:color_bg'

[hostname]
format = '[$ssh_symbol$hostname]($style)'
style = 'fg:180 bg:color_bg'
ssh_symbol = '@'

[java]
format = '[${symbol}(${version} )]($style)'
style = 'dimmed fg:red bg:color_bg'
symbol = "оү– "

[lua]
format = '[$symbol($version )]($style)'
style = 'bold fg:blue bg:color_bg'
symbol = "оҳ  "

[nodejs]
format = '[$symbol($version )]($style)'
style = 'bold fg:red bg:color_bg'
symbol = "оңҳ "

