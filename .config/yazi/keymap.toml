"$schema" = "https://yazi-rs.github.io/schemas/keymap.json"

# Arrow key navigation that preserves filters
[[mgr.prepend_keymap]]
on   = "<Up>"
run  = "arrow prev"
desc = "Previous file"

[[mgr.prepend_keymap]]
on   = "<Down>"
run  = "arrow next"
desc = "Next file"

# Arrow key navigation with filter clearing
[[mgr.prepend_keymap]]
on   = "<Left>"
run  = [ "plugin custom-filter -- clear", "leave", "plugin autosave" ]
desc = "Back to parent directory (clears filter)"

[[mgr.prepend_keymap]]
on   = "<Right>"
run  = [ "plugin custom-filter -- clear", "plugin smart-enter", "plugin autosave" ]
desc = "Smart enter: enter directories, open files (clears filter)"

# Backspace for filter management
[[mgr.prepend_keymap]]
on   = "<Backspace>"
run  = "plugin custom-filter -- backspace"
desc = "Remove last character from filter"

# Enter opens interactively
[[mgr.prepend_keymap]]
on   = "<Enter>"
run  = "plugin custom-filter -- enter"
desc = "Create file or directory from filter text"

# Ctrl+Enter to go to file's directory (useful in search results)
[[mgr.prepend_keymap]]
on   = "<C-Enter>"
run  = "plugin goto-file-dir"
desc = "Navigate to hovered file's directory"

# Smart tab navigation
[[mgr.prepend_keymap]]
on   = "<C-Right>"
run  = [ "plugin smart-tab", "plugin autosave" ]
desc = "Go to next tab or create new tab if on last"

# ALL letter keys for immediate filtering
[[mgr.prepend_keymap]]
on   = "a"
run  = "plugin custom-filter -- add a"
desc = "Filter files"

