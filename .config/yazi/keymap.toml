[mgr]

keymap = [

    # Navigation history
    { on = "[", run = "back", desc = "Go back to previous directory" },
    { on = "]", run = "forward", desc = "Go forward to next directory" },

    { on = "<Esc>", run = ["escape", "unyank", "plugin custom-filter -- clear"],             desc = "Exit visual mode, clear selection, or cancel search" },
    { on = "<C-q>",     run = "quit",               desc = "Quit the process" },
    { on = "<C-Up>", run = "arrow -30%",  desc = "Move cursor up half page" },
    { on = "<C-Down>", run = "arrow 30%",   desc = "Move cursor down half page" },
    { on = "<S-Up>", run = "arrow top", desc = "Go to top" },
    { on = "<S-Down>",          run = "arrow bot", desc = "Go to bottom" },
    { on = "<Space>", run = [ "toggle", "arrow next" ], desc = "Toggle the current selection state" },
    { on = "<C-a>",   run = "toggle_all --state=on",    desc = "Select all files" },
    { on = "<C-c>",         run = "yank",                        desc = "Yank selected files (copy)" },
    { on = "<C-x>",         run = "yank --cut",                  desc = "Yank selected files (cut)" },
    { on = "<C-v>",         run = ["paste", "escape", "unyank"],                       desc = "Paste yanked files" },
    { on = "<C-V>",         run = "paste --force",               desc = "Paste yanked files (overwrite if the destination exists)" },
    { on = "<C-Backspace>",         run = "remove",                      desc = "Trash selected files" },
    { on = "<C-Delete>",         run = "remove --permanently",        desc = "Permanently delete selected files" },
    { on = "<C-r>",         run = "rename --cursor=before_ext",  desc = "Rename selected file(s)" },
    { on = "<C-f>",         run = "search --via=fd",             desc = "Search files by name via fd" },
    { on = "<A-f>",         run = "search --via=rg",             desc = "Search files by content via ripgrep" },
    { on = "<C-z>",         run = "plugin zoxide",               desc = "Jump to a directory via zoxide" },
    { on = ";",         run = "shell --interactive",         desc = "Run a shell command" },
    { on = ":",         run = "shell --block --interactive", desc = "Run a shell command (block until finishes)" },
    { on = "`",         run = 'shell "zsh" --block',         desc = "Open zsh subshell" },

    # Linemode
    { on = [ "<", "s" ], run = "linemode size",        desc = "Linemode: size" },
    { on = [ "<", "b" ], run = "linemode btime",       desc = "Linemode: btime" },
    { on = [ "<", "m" ], run = "linemode mtime",       desc = "Linemode: mtime" },
    { on = [ "<", "n" ], run = "linemode none",        desc = "Linemode: none" },

    # Copy
    { on = [ "<C-s>", "f" ], run = "copy path",             desc = "Copy the file path" },
    { on = [ "<C-s>", "c" ], run = "copy filename",         desc = "Copy the filename" },

        # Sorting
    { on = [ ",", "m" ], run = [ "sort mtime --reverse", "linemode mtime" ],    desc = "Sort by modified time" },
    { on = [ ",", "b" ], run = [ "sort btime --reverse", "linemode btime" ],    desc = "Sort by birth time" },
    { on = [ ",", "e" ], run = "sort extension --reverse=no",                   desc = "Sort by extension" },
    { on = [ ",", "a" ], run = "sort alphabetical --reverse=no",                desc = "Sort alphabetically" },
    { on = [ ",", "n" ], run = "sort natural --reverse=no",                     desc = "Sort naturally" },
    { on = [ ",", "s" ], run = [ "sort size --reverse", "linemode size" ],      desc = "Sort by size" },

    # Tabs
    { on = "<C-Left>", run = [ "tab_switch -1 --relative", "plugin autosave" ], desc = "Switch to previous tab" },
    { on = "<C-S-Left>", run = [ "tab_swap -1", "plugin autosave" ], desc = "Swap current tab with previous tab" },
    { on = "<C-S-Right>", run = [ "tab_swap 1", "plugin autosave" ],  desc = "Swap current tab with next tab" },
    { on = "<C-w>", run = [ "close", "plugin autosave" ],              desc = "Close the current tab, or quit if it's last" },
    { on = "<C-A-Right>", run = [ "tab_create --current", "plugin autosave" ],  desc = "Create a new tab" },

    # Tasks
    { on = "W", run = "tasks:show", desc = "Show task manager" },

    # Help
    { on = "<F1>", run = "help", desc = "Open help" },
]

[tasks]

keymap = [
    { on = "<Esc>", run = "close", desc = "Close task manager" },

    { on = "<Up>",   run = "arrow prev", desc = "Previous task" },
    { on = "<Down>", run = "arrow next", desc = "Next task" },

    { on = "<Enter>", run = "inspect", desc = "Inspect the task" },
    { on = "<C-c>",       run = "cancel",  desc = "Cancel the task" },

    { on = "<F1>", run = "help", desc = "Open help" },
]

[spot]

keymap = [
    { on = "<Esc>", run = "close", desc = "Close the spot" },

    { on = "<Up>",    run = "arrow prev", desc = "Previous line" },
    { on = "<Down>",  run = "arrow next", desc = "Next line" },
    { on = "<Left>",  run = "swipe prev", desc = "Swipe to previous file" },
    { on = "<Right>", run = "swipe next", desc = "Swipe to next file" },

    # Copy
    { on = [ "c", "c" ], run = "copy cell", desc = "Copy selected cell" },

    { on = "<F1>", run = "help", desc = "Open help" },
]

[pick]

keymap = [
    { on = "<Esc>",   run = "close",          desc = "Cancel pick" },
    { on = "<Enter>", run = "close --submit", desc = "Confirm pick" },

    { on = "<Up>",   run = "arrow prev", desc = "Previous option" },
    { on = "<Down>", run = "arrow next", desc = "Next option" },

    { on = "<F1>", run = "help", desc = "Open help" },
]
[input]

keymap = [
    { on = "<ESC>",   run = "close",          desc = "Cancel input" },
    { on = "<Enter>", run = "close --submit", desc = "Submit input" },

    { on = "<Left>",  run = "move -1", desc = "Move back a character" },
    { on = "<Right>", run = "move 1",  desc = "Move forward a character" },
    { on = "<C-a>", run = [ "move eol", "visual", "move bol" ], desc = "Select from EOL to BOL" },
    { on = "<C-Left>",     run = "backward",              desc = "Move back to the start of the current or previous WORD" },
    { on = "<C-Right>",     run = "forward --end-of-word",               desc = "Move forward to the start of the next WORD" },
    { on = "<Backspace>", run = "backspace",         desc = "Delete the character before the cursor" },
    { on = "<Delete>",    run = "backspace --under", desc = "Delete the character under the cursor" },
    { on = "<C-Backspace>", run = "kill backward", desc = "Kill backwards to the start of the current word" },
    { on = "<C-Delete>", run = "kill forward",  desc = "Kill forwards to the end of the current word" },

    # Cut/Yank/Paste
    { on = "d", run = "delete --cut",                                      desc = "Cut selected characters" },
    { on = "D", run = [ "delete --cut", "move eol" ],                      desc = "Cut until EOL" },
    { on = "c", run = "delete --cut --insert",                             desc = "Cut selected characters, and enter insert mode" },
    { on = "C", run = [ "delete --cut --insert", "move eol" ],             desc = "Cut until EOL, and enter insert mode" },
    { on = "s", run = [ "delete --cut --insert", "move 1" ],               desc = "Cut current character, and enter insert mode" },
    { on = "S", run = [ "move bol", "delete --cut --insert", "move eol" ], desc = "Cut from BOL until EOL, and enter insert mode" },
    { on = "x", run = [ "delete --cut", "move 1 --in-operating" ],         desc = "Cut current character" },
    { on = "y", run = "yank",                                              desc = "Copy selected characters" },
    { on = "p", run = "paste",                                             desc = "Paste copied characters after the cursor" },
    { on = "P", run = "paste --before",                                    desc = "Paste copied characters before the cursor" },
    { on = "<C-c>", run = "yank",                                              desc = "Copy selected characters" },
    { on = "<C-x>", run = "delete --cut",                                      desc = "Cut selected characters" },
    { on = "<C-v>", run = "paste",                                             desc = "Paste copied characters after the cursor" },

    { on = "<C-z>",     run = "undo", desc = "Undo the last operation" },
    { on = "<C-Z>", run = "redo", desc = "Redo the last operation" },

    # Help
    { on = "<F1>", run = "help", desc = "Open help" },
]

[confirm]

keymap = [
    { on = "<Esc>",   run = "close",          desc = "Cancel the confirm" },
    { on = "<Enter>", run = "close --submit", desc = "Submit the confirm" },

    { on = "<Up>",   run = "arrow prev", desc = "Previous line" },
    { on = "<Down>", run = "arrow next", desc = "Next line" },

    { on = "<F1>", run = "help", desc = "Open help" },
]

[cmp]

keymap = [
    { on = "ESC",   run = "close",                                      desc = "Cancel completion" },
    { on = "<Tab>",   run = "close --submit",                             desc = "Submit the completion" },
    { on = "<Enter>", run = [ "close --submit", "input:close --submit" ], desc = "Complete and submit the input" },

    { on = "<Up>",   run = "arrow prev", desc = "Previous item" },
    { on = "<Down>", run = "arrow next", desc = "Next item" },

    { on = "<F1>", run = "help", desc = "Open help" },
]

[help]

keymap = [
    { on = "<Esc>", run = "escape", desc = "Clear the filter, or hide the help" },
    { on = "<C-c>", run = "close",  desc = "Hide the help" },

    { on = "<Up>",   run = "arrow prev", desc = "Previous line" },
    { on = "<Down>", run = "arrow next", desc = "Next line" },

    { on = "/", run = "filter", desc = "Filter help items" },
]
