"$schema" = "https://yazi-rs.github.io/schemas/yazi.json"

[mgr]
ratio          = [ 1, 4, 3 ]
sort_by        = "natural"
sort_sensitive = false
sort_reverse   = false
sort_dir_first = true
sort_translit  = false
linemode 	   = "none"
show_hidden    = true
show_symlink   = true
scrolloff      = 10
mouse_events   = [ "click", "scroll", "touch", "move", "drag" ]
title_format   = "Yazi"

[preview]
wrap            = "no"
tab_size        = 2
max_width  = 1920
max_height = 1080
image_quality = 90
image_delay     = 0
cache_dir = "~/.cache/yazi/builtin"
image_filter    = "triangle"
ueberzug_scale  = 1
ueberzug_offset = [ 0, 0, 0, 0 ]

[opener]
xdg-open = [{ run = 'xdg-open %s', desc = "xdg-open" }]
editor = [{ run = '$EDITOR %s', desc = "$EDITOR"}]
extract = [{ run = 'ya pub extract --list %s', desc = "extract here" }]
mpv = [{ run = 'mpv %s', orphan = true, desc = "mpv" }]
qimgv = [{ run = 'qimgv %s', orphan = true, desc = "qimgv" }]
pdf-arranger = [{ run = 'pdfarranger %s', orphan = true, desc = "pdf arranger" }]
master-pdf = [{ run = 'masterpdfeditor4 %s', orphan = true, desc = "pdf editor" }]
browser = [{ run = '$BROWSER %s', orphan = true, desc = "$BROWSER" }]
mcat = [{ run = "kitty @ launch --type=tab --hold --cwd=current mcat %s", desc = "mcat" }]
torrzf = [{ run = "kitty @ launch --type=tab --hold --cwd=current torrzf %s", desc = "torrzf" }]
execute-shell = [{ run = "kitty @ launch --type=tab --hold --cwd=current -- bash -c 'echo \"RUNNING ./$(basename \"$1\")\"; echo; bash \"$1\"' _ %s", desc = "run in a new tab" }]
execute-shell-bg = [{ run = 'bash %s', orphan = true, desc = "run in background" }]
execute-python = [{ run = "kitty @ launch --type=tab --hold --cwd=current -- bash -c 'echo \"RUNNING ./$(basename \"$1\")\"; echo; python \"$1\"' _ %s", desc = "run in a new tab" }]
execute-python-bg = [{ run = 'python %s', orphan = true, desc = "run in background" }]
download = [
	{ run = "ya emit download --open %S", desc = "Download and open" },
	{ run = "ya emit download %S",        desc = "Download" },
]

[open]
rules = [
	{ url = "*.{sh,bash,zsh,fish,py}", use = [ "editor", "execute-shell", "execute-shell-bg" ] },
	{ url = "*.md", use = [ "editor", "mcat" ] },
	{ url = "*.svg", use = [ "browser", "qimgv"] },
	{ mime = "text/*", use = [ "editor" ] },
	{ mime = "image/*", use = [ "qimgv" ,"pdf-arranger" ] },
	{ mime = "application/pdf", use = [ "browser", "pdf-arranger", "master-pdf"] },
	{ mime = "application/bittorrent", use = [ "mpv", "torrzf" ] },
	{ mime = "{audio,video}/*", use = [ "mpv" ] },
	{ mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", use = [ "extract" ] },
	{ mime = "application/{json,ndjson}", use = [ "editor" ] },
	{ mime = "*/javascript", use = [ "editor" ] },
	{ mime = "inode/empty", use = [ "editor" ] },
	{ mime = "vfs/{absent,stale}", use = "download" },
	{ url = "*", use = [ "editor", "xdg-open" ] },
]

[tasks]
micro_workers    = 12
macro_workers    = 12
bizarre_retry    = 3
image_alloc      = 1073741824
image_bound      = [ 0, 0 ]
suppress_preload = true

[plugin]


[[plugin.prepend_fetchers]]
id  = "git"
url = "*"
run = "git"

[[plugin.prepend_fetchers]]
id  = "git"
url = "*/"
run = "git"




preloaders = [
  { mime = "image/xcursor", run = "xcursor-preview" },
  { mime = "{audio,video,image}/*", run = "mediainfo" },
  { mime = "application/subrip", run = "mediainfo" },
  { mime = "application/postscript", run = "mediainfo" },
	{ mime = "image/{avif,hei?,jxl}", run = "magick" },
	{ mime = "image/svg+xml", run = "svg" },
	{ mime = "font/*", run = "font" },
	{ mime = "application/ms-opentype", run = "font" },
]

[[plugin.prepend_preloaders]]
mime = "image/xcursor"
run = "xcursor-preview"

[[plugin.prepend_preloaders]]
url = "*/cursors/*"
run = "xcursor-preview"

[[plugin.prepend_previewers]]
mime = "image/xcursor"
run = "xcursor-preview"

[[plugin.prepend_previewers]]
mime = "{audio,video,image}/*"
run = "mediainfo"

[[plugin.prepend_previewers]]
mime = "application/subrip"
run = "mediainfo"

[[plugin.prepend_previewers]]
mime = "application/postscript"
run = "mediainfo"

[[plugin.prepend_previewers]]
mime = "image/{avif,hei?,jxl}"
run = "magick"

[[plugin.prepend_previewers]]
mime = "image/svg+xml"
run = "svg"

[[plugin.prepend_previewers]]
url = "*.md"
run = 'faster-piper -- CLICOLOR_FORCE=1 rich --markdown --width "$w" --force-terminal --hyperlinks "$1"'

[[plugin.prepend_previewers]]
url = "*.ipynb"
run = 'faster-piper -- CLICOLOR_FORCE=1 rich --ipynb --width "$w" --force-terminal "$1"'

[[plugin.prepend_previewers]]
url = "*.csv"
run = 'faster-piper -- CLICOLOR_FORCE=1 rich --csv --width "$w" --force-terminal "$1"'

[[plugin.prepend_previewers]]
url = "*.xlsx"
run = 'faster-piper -- xlsx2csv "$1" | CLICOLOR_FORCE=1 rich --csv --width "$w" --force-terminal -'

[[plugin.prepend_previewers]]
mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}"
run = "archive"

[[plugin.prepend_previewers]]
mime = "application/{debian*-package,redhat-package-manager,rpm,android.package-archive}"
run = "archive"

[[plugin.prepend_previewers]]
url = "*.{AppImage,appimage}"
run = "archive"

[[plugin.prepend_previewers]]
mime = "application/{iso9660-image,qemu-disk,ms-wim,apple-diskimage}"
run = "archive"

[[plugin.prepend_previewers]]
mime = "application/virtualbox-{vhd,vhdx}"
run = "archive"

[[plugin.prepend_previewers]]
url = "*.{img,fat,ext,ext2,ext3,ext4,squashfs,ntfs,hfs,hfsx}"
run = "archive"

[[plugin.prepend_previewers]]
mime = "application/bittorrent"
run = 'faster-piper -- torrent-info "$1"'

[[plugin.prepend_previewers]]
url = "*.docx"
run = 'to-pdf-preview -- libreoffice --headless --convert-to pdf --outdir "$OUTDIR" "$1"'

[[plugin.prepend_previewers]]
url = "*.pptx"
run = 'to-pdf-preview -- libreoffice --headless --convert-to pdf --outdir "$OUTDIR" "$1"'

[[plugin.prepend_previewers]]
url = "*.odp"
run = 'to-pdf-preview -- libreoffice --headless --convert-to pdf --outdir "$OUTDIR" "$1"'

[[plugin.prepend_previewers]]
url = "*.odt"
run = 'to-pdf-preview -- libreoffice --headless --convert-to pdf --outdir "$OUTDIR" "$1"'

[[plugin.prepend_previewers]]
mime = "application/pdf"
run = "to-pdf-preview"

previewers = [
	{ mime = "inode/directory", run = "folder" },
	{ url = "*/", run = "folder" },
	{ mime = "text/*", run = "code" },
	{ mime = "application/{mbox,javascript,wine-extension-ini}", run = "code" },
	{ mime = "application/{json,ndjson}", run = "json" },
	{ mime = "font/*", run = "font" },
	{ mime = "application/ms-opentype", run = "font" },
	{ mime = "inode/empty", run = "empty" },
	{ url = "*", run = "file" },
]

[input]
cursor_blink = false

# create
create_title  = [ "Create:", "Create (dir):" ]
create_origin = "top-center"
create_offset = [ 0, 2, 50, 3 ]

# rename
rename_title  = "Rename:"
rename_origin = "hovered"
rename_offset = [ 0, 1, 50, 3 ]

# search
search_title  = "Search via {n}:"
search_origin = "top-center"
search_offset = [ 0, 2, 50, 3 ]

# shell
shell_title  = [ "Shell:", "Shell (block):" ]
shell_origin = "top-center"
shell_offset = [ 0, 2, 50, 3 ]

[confirm]
# trash
trash_title 	= "Trash {n} selected file{s}?"
trash_origin	= "center"
trash_offset	= [ 0, 0, 70, 20 ]

# delete
delete_title 	= "Permanently delete {n} selected file{s}?"
delete_origin	= "center"
delete_offset	= [ 0, 0, 70, 20 ]

# overwrite
overwrite_title   = "Overwrite file?"
overwrite_content = "Will overwrite the following file:"
overwrite_origin  = "center"
overwrite_offset  = [ 0, 0, 50, 15 ]

# quit
quit_title   = "Quit?"
quit_content = "The following tasks are still running, are you sure you want to quit?"
quit_origin  = "center"
quit_offset  = [ 0, 0, 50, 15 ]

[pick]
open_title  = "Open with:"
open_origin = "hovered"
open_offset = [ 0, 1, 50, 7 ]

[which]
sort_by      	 = "none"
sort_sensitive = false
sort_reverse 	 = false
sort_translit  = false
