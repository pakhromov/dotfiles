include current-theme.conf
#startup_session ~/.config/kitty/startup.session
shell .
editor .
enabled_layouts tall,grid
shell_integration no-cursor
open_url_with default
underline_hyperlinks hover
strip_trailing_spaces always
focus_follows_mouse yes
click_interval 0.2
repaint_delay 5
confirm_os_window_close 0
update_check_interval 0


allow_remote_control yes
listen_on unix:@mykitty
allow_cloning yes


enable_audio_bell no
command_on_bell none
notify_on_cmd_finish unfocused 5
notification_close_on_focus yes


copy_on_select clipboard
paste_actions quote-urls-at-prompt
clear_selection_on_clipboard_loss yes
clipboard_control write-clipboard read-clipboard


font_size 12.8
font_family      family="SpaceMono Nerd Font"
#font_family      family="0xProto Nerd Font"
#font_family      family="CaskaydiaCove Nerd Font" ExtraLight SemiLight SemiBold Regular Light
#font_family      family="D2CodingLigature Nerd Font"
