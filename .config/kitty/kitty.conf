#font_family      family="ProFont IIx Nerd Font"
#font_family      family="SauceCodePro Nerd Font" SemiBold Medium Light ExtraLight
#font_family      family="RobotoMono Nerd Font" Th SmBd Md Lt
#font_family      family="JetBrainsMono Nerd Font" Thin SemiBold Regular Medium Light ExtraLight
#font_family      family="BitstromWera Nerd Font"
#font_family      family="CommitMono Nerd Font"
#font_family      family="Cousine Nerd Font"
#font_family      family="DejaVuSansM Nerd Font"
#font_family      family="DroidSansM Nerd Font"
#font_family      family="Hack Nerd Font"
