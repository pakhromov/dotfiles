#font_family      family="LiterationMono Nerd Font"
bold_font        auto
italic_font      auto
bold_italic_font auto


cursor_shape block
cursor_trail 1
cursor_stop_blinking_after 0
#cursor_blink_interval 1


scrollback_lines 50000
#scrollback_pager less --chop-long-lines -r -j .5 +INPUT_LINE_NUMBER
#scrollback_pager ov --jump-target 50%
scrollback_pager lore
#scrollback_pager /home/pavel/.config/kitty/pager.sh
scrollbar always
scrollbar_interactive yes
scrollbar_jump_on_click yes
scrollbar_gap 0
scrollbar_width 0.5
scrollbar_hover_width 0.5
scrollbar_handle_opacity 0.2
scrollbar_track_opacity 0.0
scrollbar_track_hover_opacity 0.0


tab_bar_edge top
tab_bar_style custom
tab_bar_min_tabs 1
tab_bar_margin_width            1.0
tab_bar_margin_height           5.0 5.0
#window_padding_width 0 4
#draw_window_borders_for_single_window yes
#active_border_color #7aa2f7


clear_all_shortcuts yes
clear_all_mouse_actions yes

mouse_map left click grabbed,ungrabbed mouse_handle_click selection link prompt
mouse_map left press ungrabbed mouse_selection normal
mouse_map shift+left press grabbed mouse_selection normal
mouse_map right press ungrabbed mouse_select_command_output
mouse_map shift+right press ungrabbed,grabbed mouse_selection rectangle
mouse_map left doublepress ungrabbed mouse_selection word
mouse_map right press ungrabbed mouse_select_command_output
mouse_map middle release ungrabbed paste_from_clipboard

map ctrl+shift+enter new_window_with_cwd
map ctrl+shift+w close_window
map ctrl+shift+[ previous_window
map ctrl+shift+] next_window
map ctrl+shift+l next_layout
map ctrl+shift+s swap_with_window
map ctrl+shift+m detach_window ask

map ctrl+shift+right kitten smart_tab_right.py
map ctrl+shift+left kitten smart_tab_left.py


map ctrl+shift+f search_scrollback
map ctrl+shift+v paste_from_clipboard
map ctrl+shift+c copy_last_command_output
map ctrl+shift+o kitten hints --type hyperlink
map ctrl+shift+u open_url_with_hints
map ctrl+shift+p command_palette

map ctrl+shift+up scroll_to_prompt -1
map ctrl+shift+down scroll_to_prompt 1

map ctrl+shift+minus change_font_size all -0.3
map ctrl+shift+equal change_font_size all +0.3
map ctrl+shift+0 change_font_size all 0


map ctrl+shift+z send_text all \x1b[122;6u
map ctrl+shift+backspace send_text all \x1b[127;6u





