#font_family      family="M+CodeLat60 Nerd Font" Thin SemBd Med Light ExtLt
#font_family      family="Monaspace Neon NF" SemiBold Regular Medium Light ExtraLight
#font_family      family="MonaspiceAr Nerd Font" Medium Light
#font_family      family="MonaspiceKr Nerd Font" Medium Light
#font_family      family="MonaspiceRn Nerd Font" Medium Light
