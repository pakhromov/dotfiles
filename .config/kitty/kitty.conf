#font_family      family="FiraCode Nerd Font" SemBd Ret Reg Med Light
#font_family      family="GeistMono Nerd Font" SemiBold Thin UltraLight Medium Light
#font_family      family="Iosevka Nerd Font" Thin SemiBold Medium Light ExtraLight
#font_family      family="IosevkaTerm Nerd Font" Thin SemiBold Medium Light ExtraLight
#font_family      family="IosevkaTermSlab Nerd Font" Thin SemiBold Medium Light ExtraLight
#font_family      family="Lilex Nerd Font" ExtraLight Medium Regular Thin
#font_family      family="MartianMono Nerd Font" Med Cond
#font_family      family="RecMonoCasual Nerd Font"
#font_family      family="RecMonoDuotone Nerd Font"
#font_family      family="RecMonoLinear Nerd Font"
#font_family      family="RecMonoSmCasual Nerd Font"
#font_family      family="VictorMono Nerd Font" ExtraLight Light Medium Regular SemiBold Thin
#font_family      family="ZedMono Nerd Font" Extd Extd-Light Extd-Med Light Medium
#font_family      family="Hurmit Nerd Font" Light
#font_family      family="InputMono Nerd Font" Compressed Condensed Light Medium Narrow Thin
#font_family      family="InputSans Nerd Font" Compressed Condensed Light Medium Narrow Thin
