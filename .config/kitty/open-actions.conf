# CD into directories in current window
protocol file
mime inode/directory
action send_text all cd '${FILE_PATH}'\r
action scroll_end

# Display image files inline with icat
protocol file
mime image/*
action send_text all kitten icat '${FILE_PATH}'\r
action scroll_end

# Archives - extract into a folder named after the archive
protocol file
mime application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}
action send_text all d=$(basename '${FILE_PATH}'); d=${d%%.*}; mkdir -p "$d" && bsdtar -xf '${FILE_PATH}' -C "$d" && ls "$d"\r
action scroll_end

# Fallback - xdg-open
protocol file
action launch --type=background xdg-open -- $FILE_PATH

# Open http/https URLs in default browser
protocol http,https
action launch --type=background xdg-open $URL
