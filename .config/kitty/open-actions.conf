# CD into directories in current window
protocol file
mime inode/directory
action send_text all cd '${FILE_PATH}'\r
action scroll_end

# Display image files inline with icat
protocol file
mime image/*
action send_text all kitten icat '${FILE_PATH}'\r
action scroll_end

# Archives - extract into a folder named after the archive
protocol file
ext zip,rar,7z,tar,gz,xz,zst,bz2,lzma,tgz,tbz2,cpio,arj,xar,cab
action send_text all d=$(basename '${FILE_PATH}'); d=${d%.*}; [ "${d##*.}" = "tar" ] && d=${d%.*}; n=$(bsdtar -tf '${FILE_PATH}' | sed 's|^\./||;s|/.*||' | sort -u | wc -l); if [ "$n" -eq 1 ]; then bsdtar -xf '${FILE_PATH}' && ls; else mkdir -p "$d" && bsdtar -xf '${FILE_PATH}' -C "$d" && ls "$d"; fi\r
action scroll_end

# Open text files without fragments in the editor
protocol file
mime text/*
action launch --type=os-window -- $EDITOR -- $FILE_PATH

