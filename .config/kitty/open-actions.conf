# CD into directories in current window
protocol file
mime inode/directory
action send_text all cd '${FILE_PATH}'\r
action scroll_end

# Display image files inline with icat
protocol file
mime image/*
action send_text all kitten icat '${FILE_PATH}'\r
action scroll_end

# Archives - extract into a folder named after the archive
protocol file
ext zip,rar,7z,tar,gz,xz,zst,bz2,lzma,tgz,tbz2,cpio,arj,xar,cab
action send_text all d=$(basename '${FILE_PATH}'); d=${d%.*}; [ "${d##*.}" = "tar" ] && d=${d%.*}; mkdir -p "$d" && bsdtar -xf '${FILE_PATH}' -C "$d" && ls "$d"\r
action scroll_end

# Fallback - xdg-open
protocol file
action send_text all xdg-open '${FILE_PATH}'\r

# Open http/https URLs in default browser
protocol http,https
action send_text all xdg-open '${URL}'\r
