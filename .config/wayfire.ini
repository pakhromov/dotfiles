[animate]
close_animation = zap
duration = 400ms linear
enabled_for = !(app_id is "dulcepan" | app_id is "hyprpicker" | app_id contains "wayscriber")
fade_duration = 400ms circle
fade_enabled_for = none
fire_color = \#B22303FF
fire_duration = 300ms linear
fire_enabled_for = none
fire_particle_size = 16.000000
fire_particles = 2000
minimize_animation = none
open_animation = zap
random_fire_color = false
spin_duration = 250ms linear
spin_rotations = 1
squeezimize_duration = 150ms linear
startup_duration = 600ms linear
zap_duration = 250ms circle
zoom_duration = 500ms circle
zoom_enabled_for = none


[autostart]
autostart_wf_shell = false


[command]
binding_0 = <shift> <super> KEY_S
binding_1 = <super> KEY_V
binding_2 = <super> <ctrl>
binding_3 = <shift> <super> KEY_A
binding_4 = <super> KEY_E
binding_5 = <shift> <super> KEY_Q
binding_6 = <super> KEY_S
binding_7 = <shift> <super> KEY_D
binding_8 = <shift> <super>
binding_11 = <shift> <super> KEY_C
binding_12 = <super> KEY_SPACE
binding_13 = <super> KEY_W
binding_14 = <super> KEY_TAB
binding_16 = <super> KEY_Z
binding_17 = <shift> <super> KEY_Z
binding_18 = <shift> <super> KEY_E
binding_19 = <super> KEY_A
binding_20 = <super> KEY_C
binding_21 = <super> KEY_GRAVE
binding_22 = <shift> <super> KEY_W
binding_23 = <super> KEY_D
binding_24 = <super> KEY_U
binding_25 = <super> KEY_I
binding_26 = <super> KEY_K
binding_28 = <shift> <super> KEY_X
binding_29 = <super> KEY_ENTER
binding_30 = KEY_VOLUMEUP
binding_31 = KEY_VOLUMEDOWN
binding_32 = KEY_MUTE
binding_33 = KEY_PAGEUP
binding_34 = KEY_PAGEDOWN
binding_35 = <shift> <super> <alt> KEY_A
binding_37 = <shift> <super> <alt>
binding_38 = <super> KEY_L
binding_39 = <super> KEY_M
binding_40 = <super> KEY_N
binding_41 = <super> <alt> KEY_E
binding_42 = <super> <alt> <ctrl>


command_2 = subl
command_42 = zeditor
command_7 = hyprpicker -a
command_16 = brave-origin-beta
command_17 = brave-origin-beta --incognito
command_23 = wcm
command_37 = foot
command_38 = hyprlock
command_39 = mpv --player-operation-mode=pseudo-gui
command_22 = iwmenu --launcher rofi

command_8 = kitty --single-instance --listen-on="unix:@mykitty"
command_19 = kitty --single-instance --listen-on="unix:@mykitty" yazi
command_21 = kitty --single-instance --listen-on="unix:@mykitty" btm & sleep 0.4 && wtype -P m

command_11 = kitty-launch-or-focus.sh pacseek
command_20 = kitty-launch-or-focus.sh pacsea
command_13 = kitty-launch-or-focus.sh impala
command_26 = kitty-launch-or-focus.sh nasc


command_29 = autostart -w
command_30 = volume.sh up
command_31 = volume.sh down
command_32 = volume.sh mute
command_33 = brightness.sh up
command_34 = brightness.sh down
command_12 = keyboard-layout-switcher.sh

command_0 = dulcepan | wl-copy --type image/png
command_3 = dulcepan -f png | tesseract - stdout -l swe 2>/dev/null | wl-copy
command_35 = ocrs.sh
command_28 = wayscriber -a --no-resume-session

command_1 = cclip-menu.sh -t 'kitty --single-instance --wait-for-single-instance-window-close --class float-half'
command_25 = cclip-images.sh -t 'kitty --single-instance --wait-for-single-instance-window-close --class float-full'
