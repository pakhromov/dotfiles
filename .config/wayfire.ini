command_14 = kitty --single-instance --class float-half fsel --detach
command_40 = kitty --single-instance --class float-full vpn-command nyaazf 'naruto|-"kun.hu"|(varyg dual)'
command_24 = kitty --single-instance --class float-full yzf -u
command_6 = kitty --single-instance --class float-half audio-switch





[core]
background_color = \#1A1A1AFF
close_top_view = <super> KEY_Q
exit = <alt> <ctrl> KEY_BACKSPACE
focus_button_with_modifiers = false
focus_buttons = BTN_LEFT | BTN_MIDDLE | BTN_RIGHT
focus_buttons_passthrough = true
max_render_time = -1
plugins = expo command simple-tile vswitch follow-focus xdg-activation foreign-toplevel session-lock vswipe window-rules animate
preferred_decoration_mode = server
transaction_timeout = 100
vheight = 3
vwidth = 3
xwayland = false
xwayland_startup_script =


[expo]
background = \#1A1A1AFF
duration = 200ms circle
inactive_brightness = 0.700000
keyboard_interaction = true
offset = 10
toggle = BTN_EXTRA | <super>
transition_length = 200


[follow-focus]
change_output = false
change_view = true
focus_delay = 0
raise_on_top = false
threshold = 0


[input]
3fg_drag = none
click_method = default
cursor_size = 22
cursor_theme = mycursor
disable_touchpad_while_mouse = true
disable_touchpad_while_typing = false
drag_lock = false
gesture_sensitivity = 1.000000
kb_capslock_default_state = false
kb_numlock_default_state = false
kb_repeat_delay = 400
kb_repeat_rate = 40
left_handed_mode = false
middle_emulation = false
modifier_binding_timeout = 400
mouse_accel_profile = flat
mouse_cursor_speed = 0.000000
mouse_natural_scroll = false
mouse_scroll_speed = 1.000000
natural_scroll = true
scroll_method = default
tablet_motion_mode = default
tap_and_drag = true
tap_to_click = true
touchpad_accel_profile = default
touchpad_cursor_speed = 0.000000
touchpad_scroll_speed = 1.000000
xkb_layout = us, se, ru
xkb_model =
xkb_options = grp:win_space_toggle
xkb_rules = evdev
xkb_variant =

[simple-tile]
animation_duration = 300ms circle
button_move = <super> BTN_LEFT
button_resize = <super> BTN_RIGHT
inner_gap_size = 0
keep_fullscreen_on_adjacent = true
key_focus_above = <alt> <super> KEY_UP
key_focus_below = <alt> <super> KEY_DOWN
key_focus_left = <alt> <super> KEY_LEFT
key_focus_right = <alt> <super> KEY_RIGHT
key_toggle = <super> KEY_T
outer_horiz_gap_size = 0
outer_vert_gap_size = 0
preview_base_border = \#404080CC
preview_base_color = \#8080FF80
preview_border_width = 3
tile_by_default = !(app_id contains "float")

[vswipe]
background = \#1A1A1AFF
delta_threshold = 24.000000
duration = 180ms circle
enable_free_movement = true
enable_horizontal = true
enable_smooth_transition = true
enable_vertical = true
fingers = 3
gap = 32.000000
speed_cap = 0.050000
speed_factor = 256.000000
threshold = 0.350000

[vswitch]
background = \#1A1A1AFF
binding_down = <super> KEY_DOWN
binding_last =
binding_left = <super> KEY_LEFT
binding_right = <super> KEY_RIGHT
binding_up = <super> KEY_UP
duration = 300ms circle
gap = 0
send_win_down =
send_win_last =
send_win_left =
send_win_right =
send_win_up =
with_win_down = <shift> <super> KEY_DOWN
with_win_last =
with_win_left = <shift> <super> KEY_LEFT
with_win_right = <shift> <super> KEY_RIGHT
with_win_up = <shift> <super> KEY_UP
wraparound = false

[window-rules]
rule_1 = on created if app_id contains "float-half" then set geometry_ppt 25 0 50 100
rule_2 = on created if app_id contains "float-full" then set geometry_ppt 0 0 100 100

[workarounds]
all_dialogs_modal = false
app_id_mode = stock
auto_reload_config = true
config_reload_delay = 20
disable_primary_selection = true
discard_command_output = true
dynamic_repaint_delay = false
enable_input_method_v2 = false
enable_opaque_region_damage_optimizations = false
enable_so_unloading = false
focus_main_surface_instead_of_popup = false
force_frame_sync = false
force_preferred_decoration_mode = false
keep_last_toplevel_activated = false
max_buffer_size = 3840
remove_output_limits = false
use_external_output_configuration = true


[xdg-activation]
check_surface = false
only_last_request = false
timeout = 30
