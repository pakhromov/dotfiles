[flags]

rate = 1000
cpu_left_legend = true
default_time_value = "120s"
time_delta = 15000
process_memory_as_value = true
show_table_scroll_position = true
disable_advanced_kill = true
retention = "10m"
tree_collapse = false
group_processes = false
autohide_time = true
hide_k_threads = true

#hide_time = true
#expanded = true
#hide_table_gap = true
tree = true
#process_command = true

#use_old_network_legend = true
#network_use_binary_prefix = false
#network_use_bytes = false
#network_use_log = false

# "none", "top-left", "top", "top-right", "left", "right", "bottom-left", "bottom", "bottom-right".
memory_legend = "top-left"
#network_legend = "top-left"

[processes]
# PID, Name, CPU%, Mem%, R/s, W/s, T.Read, T.Write, User, State, Time, GMem%, GPU%
columns = ["Name", "CPU%", "GPU%", "Mem%", "GMem%", "User", "Time"]

[cpu]
# "all", "average"/"avg"
default = "average"

[temperature]
[temperature.sensor_filter]
is_list_ignored = true
list = ["sensor", "package"]
#regex = false
#case_sensitive = false
#whole_word = false


[disk]
# Disk, Mount, Used, Free, Total, Used%, Free%, R/s, W/s
columns = ["Mount", "Free", "Total"]

#[disk.name_filter]
#is_list_ignored = true
#list = ["/dev/sda\\d+", "/dev/nvme0n1p2"]
#regex = true
#case_sensitive = false
#whole_word = false


[disk.mount_filter]
is_list_ignored = true
list = ["/srv", "/var/cache", "/root", "/home", "/var/tmp", "/var/log"]
#regex = true
#case_sensitive = false
#whole_word = false


#[network]
#[network.interface_filter]
#is_list_ignored = true
#list = ["virbr0.*"]
#regex = true
#case_sensitive = false
#whole_word = false


[styles] # Uncomment if you want to use custom styling
# Built-in themes. Valid values are:
# - "default"
# - "default-light"
# - "gruvbox"
# - "gruvbox-light"
# - "nord"
# - "nord-light".
#
# This will have the lowest precedence if a custom colour palette is set,
# or overridden if the command-line flag for a built-in theme is set.
theme = "nord-light"

#[styles.cpu]
#all_entry_color = "green"
#avg_entry_color = "red"
#cpu_core_colors = ["light magenta", "light yellow", "light cyan", "light green", "light blue", "cyan", "green", "blue"]

#[styles.memory]
#ram_color = "light magenta"
#cache_color = "light red"
#swap_color = "light yellow"
#arc_color = "light cyan"
#gpu_colors = ["light blue", "light red", "cyan", "green", "blue", "red"]

#[styles.network]
#rx_color = "light magenta"
#tx_color = "light yellow"
#rx_total_color = "light cyan"
#tx_total_color = "light green"

#[styles.battery]
#high_battery_color = "green"
#medium_battery_color = "yellow"
#low_battery_color = "red"

#[styles.tables]
#headers = {color = "light blue", bold = true}

#[styles.graphs]
#graph_color = "gray"
#legend_text = {color = "gray"}

#[styles.widgets]
#border_color = "gray"
#selected_border_color = "light blue"
#widget_title = {color = "gray"}
#text = {color = "gray"}
#selected_text = {color = "black", bg_color = "light blue"}
#disabled_text = {color = "dark gray"}

# Layout - layouts follow a pattern like this:
# [[row]] represents a row in the application.
# [[row.child]] represents either a widget or a column.
# [[row.child.child]] represents a widget.
#
# All widgets must have the type value set to one of ["cpu", "mem", "proc", "net", "temp", "disk", "empty"].

[[row]]
  ratio=1
  [[row.child]]
  type="cpu"
  [[row.child]]
  type="mem"
[[row]]
  ratio=3
  [[row.child]]
  ratio=1
    [[row.child.child]]
    ratio=20
    type="temp"
    [[row.child.child]]
    ratio=15
    type="disk"
  [[row.child]]
  	ratio=3
    type="proc"
    default=true
