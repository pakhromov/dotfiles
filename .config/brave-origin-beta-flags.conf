# Brave Origin Beta launch flags
# Native Wayland mode (avoids XWayland resampling artifacts)
--ozone-platform-hint=auto
# Use wp_fractional_scale_v1 protocol so the compositor handles fractional scaling natively
#--enable-features=WaylandFractionalScaleV1
# Scale the entire browser UI (1.0 = default, 0.9 = 90%, 0.8 = 80%, etc.)
--disable-crashpad-for-testing
